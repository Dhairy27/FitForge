<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dark-blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <filter id="deep-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="none"/>
  <!-- Stylized H with deeper tones -->
  <path d="M65 45 V155 M135 45 V155 M65 100 H135" stroke="url(#dark-blue-grad)" stroke-width="24" stroke-linecap="round" fill="none" filter="url(#deep-glow)"/>
  <!-- Biometric Pulse Line -->
  <path d="M40 100 Q70 60, 100 100 T160 100" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Central Core Node -->
  <circle cx="100" cy="100" r="10" fill="#0ea5e9" opacity="0.5">
    <animate attributeName="r" values="10;14;10" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2.5s" repeatCount="indefinite" />
  </circle>
</svg>
